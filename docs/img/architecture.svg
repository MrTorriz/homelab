<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="'Cascadia Mono', 'Fira Code', monospace">
  <defs>
    <style>
      .text       { fill: #e6e6e6; }
      .text-dim   { fill: #a3a3a3; }
      .text-muted { fill: #666; }
      .label-title { font-size: 11px; fill: #a3a3a3; letter-spacing: 2px; }
      .label-name  { font-size: 14px; fill: #e6e6e6; font-weight: 500; }
      .label-sub   { font-size: 11px; fill: #a3a3a3; }
      .label-flow  { font-size: 10px; fill: #c0c0c0; letter-spacing: 1px; }
    </style>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#5fa8d3"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#a3be8c"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#e06c75"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#56b6c2"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#c678dd"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#0d0d0d"/>

  <!-- Internet (top) -->
  <g transform="translate(540, 30)">
    <ellipse cx="60" cy="22" rx="60" ry="22" fill="#0d0d0d" stroke="#5c6370" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="60" y="27" text-anchor="middle" class="text-dim" font-size="13">🌐 Internet</text>
  </g>

  <!-- EDGE row -->
  <g transform="translate(80, 110)">
    <rect width="1040" height="98" rx="14" fill="#161616" stroke="#f0a830" stroke-width="1.5"/>
    <text x="22" y="22" class="label-title">EDGE / PERIMETER</text>

    <g transform="translate(40, 36)">
      <rect width="280" height="50" rx="8" fill="#1c1c1c" stroke="#f0a830" stroke-width="1.2"/>
      <text x="140" y="22" text-anchor="middle" class="label-name">Cloudflare Tunnel</text>
      <text x="140" y="40" text-anchor="middle" class="label-sub">+ Google OAuth · zero open ports</text>
    </g>

    <g transform="translate(380, 36)">
      <rect width="240" height="50" rx="8" fill="#1c1c1c" stroke="#f0a830" stroke-width="1.2"/>
      <text x="120" y="22" text-anchor="middle" class="label-name">Home router</text>
      <text x="120" y="40" text-anchor="middle" class="label-sub">no port-forwarding</text>
    </g>

    <g transform="translate(680, 36)">
      <rect width="320" height="50" rx="8" fill="#1c1c1c" stroke="#f0a830" stroke-width="1.2"/>
      <text x="160" y="22" text-anchor="middle" class="label-name">AdGuard Home</text>
      <text x="160" y="40" text-anchor="middle" class="label-sub">LAN-wide DNS · ad-blocking</text>
    </g>
  </g>

  <!-- HOST container -->
  <g transform="translate(80, 240)">
    <rect width="1040" height="490" rx="14" fill="#161616" stroke="#abb2bf" stroke-width="1"/>
    <text x="22" y="22" class="label-title">DOCKER HOST · UBUNTU 24.04 · ~50 SERVICES</text>

    <!-- NPM (centered top) -->
    <g transform="translate(440, 44)">
      <rect width="160" height="56" rx="10" fill="#1c1c1c" stroke="#5fa8d3" stroke-width="2"/>
      <text x="80" y="24" text-anchor="middle" class="label-name">NPM</text>
      <text x="80" y="42" text-anchor="middle" class="label-sub">:80 / :443 · TLS</text>
    </g>

    <!-- Detection (left middle) -->
    <g transform="translate(30, 130)">
      <rect width="320" height="120" rx="10" fill="#161616" stroke="#e06c75" stroke-width="1.5"/>
      <text x="20" y="22" class="label-title" fill="#e06c75">DETECTION</text>

      <g transform="translate(20, 40)">
        <rect width="86" height="60" rx="6" fill="#1c1c1c" stroke="#e06c75" stroke-width="1"/>
        <text x="43" y="26" text-anchor="middle" class="label-name" font-size="12">UFW</text>
        <text x="43" y="46" text-anchor="middle" class="label-sub" font-size="10">22k drops/wk</text>
      </g>
      <g transform="translate(118, 40)">
        <rect width="86" height="60" rx="6" fill="#1c1c1c" stroke="#e06c75" stroke-width="1"/>
        <text x="43" y="26" text-anchor="middle" class="label-name" font-size="12">fail2ban</text>
        <text x="43" y="46" text-anchor="middle" class="label-sub" font-size="10">SSH brute</text>
      </g>
      <g transform="translate(216, 40)">
        <rect width="86" height="60" rx="6" fill="#1c1c1c" stroke="#e06c75" stroke-width="1"/>
        <text x="43" y="26" text-anchor="middle" class="label-name" font-size="12">Suricata</text>
        <text x="43" y="46" text-anchor="middle" class="label-sub" font-size="10">passive IDS</text>
      </g>
    </g>

    <!-- Apps (right of detection) -->
    <g transform="translate(380, 130)">
      <rect width="630" height="120" rx="10" fill="#161616" stroke="#a3be8c" stroke-width="1.5"/>
      <text x="20" y="22" class="label-title" fill="#a3be8c">APPS</text>

      <g transform="translate(20, 40)">
        <rect width="140" height="60" rx="6" fill="#1c1c1c" stroke="#a3be8c" stroke-width="1"/>
        <text x="70" y="22" text-anchor="middle" class="label-name" font-size="12">Media · *ARR</text>
        <text x="70" y="40" text-anchor="middle" class="label-sub" font-size="10">Plex · Sonarr</text>
        <text x="70" y="52" text-anchor="middle" class="label-sub" font-size="10">Radarr · Tdarr</text>
      </g>
      <g transform="translate(172, 40)">
        <rect width="140" height="60" rx="6" fill="#1c1c1c" stroke="#a3be8c" stroke-width="1"/>
        <text x="70" y="22" text-anchor="middle" class="label-name" font-size="12">Photos</text>
        <text x="70" y="40" text-anchor="middle" class="label-sub" font-size="10">Immich</text>
        <text x="70" y="52" text-anchor="middle" class="label-sub" font-size="10">NVENC + CUDA</text>
      </g>
      <g transform="translate(324, 40)">
        <rect width="140" height="60" rx="6" fill="#1c1c1c" stroke="#a3be8c" stroke-width="1"/>
        <text x="70" y="22" text-anchor="middle" class="label-name" font-size="12">Files &amp; sync</text>
        <text x="70" y="40" text-anchor="middle" class="label-sub" font-size="10">Nextcloud</text>
        <text x="70" y="52" text-anchor="middle" class="label-sub" font-size="10">+ Postgres + Redis</text>
      </g>
      <g transform="translate(476, 40)">
        <rect width="140" height="60" rx="6" fill="#1c1c1c" stroke="#a3be8c" stroke-width="1"/>
        <text x="70" y="22" text-anchor="middle" class="label-name" font-size="12">Local AI</text>
        <text x="70" y="40" text-anchor="middle" class="label-sub" font-size="10">Ollama · WebUI</text>
        <text x="70" y="52" text-anchor="middle" class="label-sub" font-size="10">Faster-Whisper</text>
      </g>
    </g>

    <!-- Observability (bottom-left) -->
    <g transform="translate(30, 280)">
      <rect width="490" height="180" rx="10" fill="#161616" stroke="#56b6c2" stroke-width="1.5"/>
      <text x="20" y="22" class="label-title" fill="#56b6c2">OBSERVABILITY</text>

      <g transform="translate(20, 40)">
        <rect width="130" height="56" rx="6" fill="#1c1c1c" stroke="#56b6c2" stroke-width="1"/>
        <text x="65" y="22" text-anchor="middle" class="label-name" font-size="12">Exporters</text>
        <text x="65" y="38" text-anchor="middle" class="label-sub" font-size="10">node · cAdvisor</text>
        <text x="65" y="50" text-anchor="middle" class="label-sub" font-size="10">Scaphandre · NVIDIA</text>
      </g>
      <line x1="156" y1="68" x2="186" y2="68" stroke="#56b6c2" stroke-width="1.2" marker-end="url(#arrow-cyan)"/>

      <g transform="translate(190, 40)">
        <rect width="130" height="56" rx="6" fill="#1c1c1c" stroke="#56b6c2" stroke-width="1"/>
        <text x="65" y="22" text-anchor="middle" class="label-name" font-size="12">Prometheus</text>
        <text x="65" y="38" text-anchor="middle" class="label-sub" font-size="10">90 d retention</text>
        <text x="65" y="50" text-anchor="middle" class="label-sub" font-size="10">15 s scrape</text>
      </g>
      <line x1="326" y1="68" x2="356" y2="68" stroke="#56b6c2" stroke-width="1.2" marker-end="url(#arrow-cyan)"/>

      <g transform="translate(360, 40)">
        <rect width="116" height="56" rx="6" fill="#1c1c1c" stroke="#56b6c2" stroke-width="1"/>
        <text x="58" y="22" text-anchor="middle" class="label-name" font-size="12">Grafana</text>
        <text x="58" y="38" text-anchor="middle" class="label-sub" font-size="10">power · energy</text>
        <text x="58" y="50" text-anchor="middle" class="label-sub" font-size="10">cost panel</text>
      </g>

      <g transform="translate(20, 110)">
        <rect width="456" height="50" rx="6" fill="#1c1c1c" stroke="#56b6c2" stroke-width="1" stroke-dasharray="3 2"/>
        <text x="228" y="22" text-anchor="middle" class="label-name" font-size="12">Event-driven ntfy · 7 sources</text>
        <text x="228" y="38" text-anchor="middle" class="label-sub" font-size="10">SSH · sudo · fail2ban · Suricata · Docker · NPM · file-watcher → iPhone</text>
      </g>
    </g>

    <!-- VPN tunnel (bottom-right) -->
    <g transform="translate(550, 280)">
      <rect width="460" height="180" rx="10" fill="#161616" stroke="#c678dd" stroke-width="1.5"/>
      <text x="20" y="22" class="label-title" fill="#c678dd">VPN TUNNEL · MULLVAD</text>

      <g transform="translate(20, 50)">
        <rect width="200" height="100" rx="6" fill="#1c1c1c" stroke="#c678dd" stroke-width="1"/>
        <text x="100" y="36" text-anchor="middle" class="label-name" font-size="13">qBittorrent</text>
        <text x="100" y="56" text-anchor="middle" class="label-sub" font-size="11">VPN-bound</text>
        <text x="100" y="74" text-anchor="middle" class="label-sub" font-size="11">killswitch active</text>
        <text x="100" y="92" text-anchor="middle" class="label-sub" font-size="11">port 6881 · wg0</text>
      </g>

      <g transform="translate(240, 70)">
        <rect width="200" height="60" rx="30" fill="#1c1c1c" stroke="#c678dd" stroke-width="1"/>
        <text x="100" y="32" text-anchor="middle" class="label-name" font-size="13">Mullvad WG</text>
        <text x="100" y="48" text-anchor="middle" class="label-sub" font-size="11">lockdown · 6 h rotation</text>
      </g>
    </g>
  </g>

  <!-- FLOW LINES -->
  <line x1="600" y1="74" x2="220" y2="146" stroke="#5fa8d3" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="370" y="100" class="label-flow" fill="#5fa8d3">HTTPS</text>

  <line x1="600" y1="74" x2="500" y2="146" stroke="#5fa8d3" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#arrow-blue)"/>
  <text x="568" y="116" class="label-flow text-dim">DNS / WAN</text>

  <line x1="220" y1="208" x2="500" y2="284" stroke="#5fa8d3" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="320" y="240" class="label-flow" fill="#5fa8d3">private tunnel</text>

  <line x1="840" y1="208" x2="600" y2="284" stroke="#f0a830" stroke-width="1.2" marker-end="url(#arrow-blue)"/>

  <line x1="600" y1="340" x2="700" y2="370" stroke="#a3be8c" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="608" y="362" class="label-flow" fill="#a3be8c">TLS-terminated</text>

  <line x1="290" y1="370" x2="480" y2="332" stroke="#e06c75" stroke-width="1.2" stroke-dasharray="3 3" marker-end="url(#arrow-red)"/>

  <path d="M 1010 460 Q 1140 350 1140 90 Q 1140 60 720 70" stroke="#c678dd" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <text x="1148" y="280" class="label-flow" fill="#c678dd" transform="rotate(90 1148 280)">exit IP via Mullvad</text>

  <text x="1180" y="748" text-anchor="end" class="text-muted" font-size="10">docs/img/architecture.svg · hand-designed</text>
</svg>
