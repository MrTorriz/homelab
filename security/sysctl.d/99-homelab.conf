# Homelab kernel tuning
#
# Apply with:
#   sudo cp 99-homelab.conf /etc/sysctl.d/
#   sudo sysctl --system
#
# Verify:
#   sysctl vm.swappiness

# ─── Memory ──────────────────────────────────────────────────
# Reduce swappiness — the host has plenty of RAM (16 GB+) and
# benefits more from filesystem cache than from swapping pages
# out aggressively. Default is 60; 10 keeps swap as a true
# last-resort.
vm.swappiness = 10

# ─── Optional: tune as workload dictates (commented out) ─────

# Reclaim inode/dentry cache less aggressively. Useful on
# media servers that walk huge directory trees (Plex scans).
# vm.vfs_cache_pressure = 50

# Larger socket buffers help on high-bandwidth links (e.g. when
# Tdarr is moving GB of remuxes between disks over a 10G NIC).
# net.core.rmem_max = 16777216
# net.core.wmem_max = 16777216

# Enable BBR congestion control — better throughput on long-fat
# links such as the WireGuard tunnel to the offsite backup.
# net.core.default_qdisc = fq
# net.ipv4.tcp_congestion_control = bbr

# Drop ICMP redirect acceptance (we are not a router).
# net.ipv4.conf.all.accept_redirects = 0
# net.ipv6.conf.all.accept_redirects = 0
