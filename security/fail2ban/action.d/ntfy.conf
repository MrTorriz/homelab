# /etc/fail2ban/action.d/ntfy.conf
#
# Wire fail2ban's ban/unban events into the homelab ntfy alerter.
# Pair with scripts/security/fail2ban-notify.sh.
#
# Install:
#   sudo cp ntfy.conf /etc/fail2ban/action.d/ntfy.conf
#   sudo systemctl restart fail2ban

[Definition]
actionstart =
actionstop  =
actioncheck =

actionban   = /opt/homelab/scripts/security/fail2ban-notify.sh ban   <ip> <name> <failures>
actionunban = /opt/homelab/scripts/security/fail2ban-notify.sh unban <ip> <name>
