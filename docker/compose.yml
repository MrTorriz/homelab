# ────────────────────────────────────────────────────────────
# Homelab — Docker Compose stack
#
# A curated, self-hosted stack covering media, photos, AI,
# productivity, security, observability and reverse proxy.
# Every container runs with `no-new-privileges` and binds only
# to the LAN interface.
#
# Setup:  cp .env.example .env  →  edit  →  docker compose up -d
# ────────────────────────────────────────────────────────────

services:

  # ── Reverse proxy ────────────────────────────────────────
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    ports:
      - "${LAN_IP}:80:80"
      - "${LAN_IP}:81:81"
      - "${LAN_IP}:443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${APPDATA_DIR}/npm/data:/data
      - ${APPDATA_DIR}/npm/letsencrypt:/etc/letsencrypt
    networks: [default]

  # ── Dashboards ───────────────────────────────────────────
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: always
    security_opt: [no-new-privileges:true]
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=${LAN_IP}:3000,${LAN_IP},localhost,homepage.${DOMAIN}
      - DOCKER_HOST=tcp://docker-proxy:2375
    volumes:
      - ${APPDATA_DIR}/homepage:/app/config
      - ${MEDIA_DIR}:/mnt/media:ro
      - ${STORAGE_DIR}:/mnt/storage:ro
    ports:
      - "${LAN_IP}:3000:3000"
    depends_on: [docker-proxy]
    networks: [default]

  glance:
    image: glanceapp/glance:latest
    container_name: glance
    restart: always
    security_opt: [no-new-privileges:true]
    ports:
      - "${LAN_IP}:8092:8080"
    volumes:
      - ${APPDATA_DIR}/glance/glance.yml:/app/config/glance.yml
      - ${APPDATA_DIR}/glance/custom.css:/app/assets/custom.css:ro
    networks: [default]

  # 3 themed Glance instances are embedded as iframes on the Homepage FEED tab.
  # Custom JS swaps the active iframe based on the selected Homepage theme.
  glance-deepspace:
    image: glanceapp/glance:latest
    container_name: glance-deepspace
    restart: always
    security_opt: [no-new-privileges:true]
    ports:
      - "${LAN_IP}:8093:8080"
    volumes:
      - ${APPDATA_DIR}/glance/glance.deepspace.yml:/app/config/glance.yml:ro
      - ${APPDATA_DIR}/glance/pages.yml:/app/config/pages.yml:ro
      - ${APPDATA_DIR}/glance/custom.css:/app/assets/custom.css:ro
    networks: [default]

  glance-tokyo:
    image: glanceapp/glance:latest
    container_name: glance-tokyo
    restart: always
    security_opt: [no-new-privileges:true]
    ports:
      - "${LAN_IP}:8094:8080"
    volumes:
      - ${APPDATA_DIR}/glance/glance.tokyo.yml:/app/config/glance.yml:ro
      - ${APPDATA_DIR}/glance/pages.yml:/app/config/pages.yml:ro
      - ${APPDATA_DIR}/glance/custom.css:/app/assets/custom.css:ro
    networks: [default]

  glance-amber:
    image: glanceapp/glance:latest
    container_name: glance-amber
    restart: always
    security_opt: [no-new-privileges:true]
    ports:
      - "${LAN_IP}:8095:8080"
    volumes:
      - ${APPDATA_DIR}/glance/glance.amber.yml:/app/config/glance.yml:ro
      - ${APPDATA_DIR}/glance/pages.yml:/app/config/pages.yml:ro
      - ${APPDATA_DIR}/glance/custom.css:/app/assets/custom.css:ro
    networks: [default]

  # ── Docker management ────────────────────────────────────
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: docker-proxy
    restart: always
    security_opt: [no-new-privileges:true]
    ports:
      - "127.0.0.1:2375:2375"
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - INFO=1
      - NETWORKS=1
      - SERVICES=1
      - TASKS=1
      - VOLUMES=1
      - POST=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [default]

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    security_opt: [no-new-privileges:true]
    environment:
      - DOCKER_HOST=tcp://docker-proxy:2375
    volumes:
      - ${APPDATA_DIR}/portainer:/data
    ports:
      - "${LAN_IP}:9000:9000"
    depends_on: [docker-proxy]
    networks: [default]

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    environment:
      - DOCKER_HOST=tcp://docker-proxy:2375
    ports:
      - "${LAN_IP}:8888:8080"
    depends_on: [docker-proxy]
    networks: [default]

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    environment:
      - DOCKER_HOST=tcp://docker-proxy:2375
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 0 4 * * *
      - TZ=${TZ}
    depends_on: [docker-proxy]
    networks: [default]

  # ── Media stack ──────────────────────────────────────────
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    security_opt: [no-new-privileges:true]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - VERSION=docker
      - TZ=${TZ}
    volumes:
      - ${APPDATA_DIR}/plex:/config
      - ${MEDIA_DIR}:/mnt/media
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPDATA_DIR}/sonarr:/config
      - ${STORAGE_DIR}/data:/data
      - ${MEDIA_DIR}:/mnt/media
    ports:
      - "${LAN_IP}:8989:8989"
    networks: [default]

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPDATA_DIR}/radarr:/config
      - ${STORAGE_DIR}/data:/data
      - ${MEDIA_DIR}:/mnt/media
    ports:
      - "${LAN_IP}:7878:7878"
    networks: [default]

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPDATA_DIR}/lidarr:/config
      - ${STORAGE_DIR}/data:/data
      - ${MEDIA_DIR}/music:/music
    ports:
      - "${LAN_IP}:8686:8686"
    networks: [default]

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPDATA_DIR}/bazarr:/config
      - ${STORAGE_DIR}/data:/data
      - ${MEDIA_DIR}:/mnt/media
    ports:
      - "${LAN_IP}:6767:6767"
    networks: [default]

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPDATA_DIR}/prowlarr:/config
    ports:
      - "${LAN_IP}:9696:9696"
    networks: [default]

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    ports:
      - "${LAN_IP}:8191:8191"
    networks: [default]

  qbittorrent:
    # Bound to VPN interface on host — see security/vpn-killswitch.md
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: host
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ${APPDATA_DIR}/qbittorrent:/config
      - ${STORAGE_DIR}/data:/data

  tdarr:
    image: ghcr.io/haveagitgat/tdarr:latest
    container_name: tdarr
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - serverIP=0.0.0.0
      - serverPort=8266
      - webUIPort=8265
      - internalNode=true
      - inContainer=true
      - ffmpegVersion=7
    volumes:
      - ${APPDATA_DIR}/tdarr/server:/app/server
      - ${APPDATA_DIR}/tdarr/configs:/app/configs
      - ${APPDATA_DIR}/tdarr/logs:/app/logs
      - ${STORAGE_DIR}/tdarr-cache:/temp
      - ${MEDIA_DIR}:/media
    ports:
      - "${LAN_IP}:8265:8265"
      - "${LAN_IP}:8266:8266"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks: [default]

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    environment:
      - TZ=${TZ}
    ports:
      - "${LAN_IP}:5055:5055"
    volumes:
      - ${APPDATA_DIR}/seerr:/app/config
    networks: [default]

  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPDATA_DIR}/audiobookshelf/config:/config
      - ${APPDATA_DIR}/audiobookshelf/metadata:/metadata
      - ${MEDIA_DIR}/books:/books
    ports:
      - "${LAN_IP}:8000:80"
    networks: [default]

  # ── Photos (Immich, GPU-accelerated) ─────────────────────
  # Server uses NVENC for video transcodes; ML uses CUDA for CLIP
  # smart-search + buffalo_l face detection. Storage template
  # (year/month/filename) and tuned concurrency are configured
  # via the Immich admin API after first boot — see docker/README.md.
  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION}
    container_name: immich_server
    restart: always
    security_opt: [no-new-privileges:true]
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    env_file: [.env]
    volumes:
      - ${STORAGE_DIR}/immich-photos:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "${LAN_IP}:2283:2283"
    depends_on: [immich-redis, immich-postgres]
    networks: [default]

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION}-cuda
    container_name: immich_machine_learning
    restart: always
    security_opt: [no-new-privileges:true]
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    env_file: [.env]
    volumes:
      - ${APPDATA_DIR}/immich/model-cache:/cache
    networks: [default]

  immich-redis:
    image: redis:6.2-alpine
    container_name: immich_redis
    restart: always
    security_opt: [no-new-privileges:true]
    networks: [default]

  immich-postgres:
    image: tensorchord/pgvecto-rs:pg14-v0.2.0
    container_name: immich_postgres
    restart: always
    security_opt: [no-new-privileges:true]
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_DB=${DB_DATABASE_NAME}
    volumes:
      - ${APPDATA_DIR}/immich/postgres:/var/lib/postgresql/data
    networks: [default]

  # ── Files & sync (Nextcloud) ─────────────────────────────
  # Three-container stack: app (apache), Postgres 16, Redis 7.
  # External storage at ${STORAGE_DIR}/Nextcloud is mounted read-write so users
  # can browse host-side directories (e.g. per-device backup folders) directly.
  nextcloud:
    image: nextcloud:30-apache
    container_name: nextcloud
    restart: always
    security_opt: [no-new-privileges:true]
    environment:
      - POSTGRES_HOST=nextcloud-db
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=${NEXTCLOUD_DB_PASS}
      - REDIS_HOST=nextcloud-redis
      - REDIS_HOST_PASSWORD=${NEXTCLOUD_REDIS_PASS}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASS}
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_DOMAIN} ${LAN_IP}
      - TRUSTED_PROXIES=172.18.0.0/16
      - OVERWRITEPROTOCOL=https
      - OVERWRITEHOST=${NEXTCLOUD_DOMAIN}
      - OVERWRITECLIURL=https://${NEXTCLOUD_DOMAIN}
      - PHP_MEMORY_LIMIT=1G
      - PHP_UPLOAD_LIMIT=10G
      - TZ=${TZ}
    volumes:
      - ${APPDATA_DIR}/nextcloud/html:/var/www/html
      - ${STORAGE_DIR}/Nextcloud:/external/storage:rw
    ports:
      - "${LAN_IP}:8081:80"
    depends_on: [nextcloud-db, nextcloud-redis]
    networks: [default]

  nextcloud-db:
    image: postgres:16-alpine
    container_name: nextcloud-db
    restart: always
    security_opt: [no-new-privileges:true]
    environment:
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=${NEXTCLOUD_DB_PASS}
      - POSTGRES_DB=nextcloud
    volumes:
      - ${APPDATA_DIR}/nextcloud-db:/var/lib/postgresql/data
    networks: [default]

  nextcloud-redis:
    image: redis:7-alpine
    container_name: nextcloud-redis
    restart: always
    security_opt: [no-new-privileges:true]
    command: redis-server --requirepass ${NEXTCLOUD_REDIS_PASS}
    volumes:
      - ${APPDATA_DIR}/nextcloud-redis:/data
    networks: [default]

  # ── Local LLM stack (GPU) ────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=10m
    volumes:
      - ${APPDATA_DIR}/ollama:/root/.ollama
    ports:
      - "${LAN_IP}:11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks: [default]

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - WEBUI_AUTH=true
      - ENABLE_SIGNUP=true
      - DEFAULT_USER_ROLE=pending
    volumes:
      - ${APPDATA_DIR}/open-webui:/app/backend/data
    ports:
      - "${LAN_IP}:3333:8080"
    depends_on: [ollama]
    networks: [default]

  # ── Speech-to-text (GPU) ─────────────────────────────────
  # Used by Bazarr for offline subtitle generation from Plex audio tracks.
  faster-whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest-gpu
    container_name: faster-whisper
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    environment:
      - ASR_MODEL=small
      - ASR_ENGINE=faster_whisper
    ports:
      - "${LAN_IP}:9001:9000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks: [default]

  # ── Network-wide DNS / ad-blocking ───────────────────────
  adguardhome:
    image: adguard/adguardhome
    container_name: adguardhome
    restart: unless-stopped
    network_mode: host
    security_opt: [no-new-privileges:true]
    volumes:
      - ${APPDATA_DIR}/adguard/work:/opt/adguardhome/work
      - ${APPDATA_DIR}/adguard/conf:/opt/adguardhome/conf

  # ── Security ─────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    command: tunnel --loglevel info run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks: [default]

  # ── Observability ────────────────────────────────────────
  glances:
    image: nicolargo/glances:latest-full
    container_name: glances
    restart: always
    pid: host
    network_mode: host
    security_opt: [no-new-privileges:true]
    cap_add: [SYS_PTRACE, NET_ADMIN]
    volumes:
      - /dev:/dev:ro
      - ${STORAGE_DIR}:/mnt/storage:ro
      - ${MEDIA_DIR}:/mnt/media
    environment:
      - GLANCES_OPT=-w --bind ${LAN_IP}
      - DOCKER_HOST=tcp://127.0.0.1:2375
    depends_on: [docker-proxy]

  scrutiny:
    # Reads SMART data — needs raw disk access (acceptable trade-off)
    image: ghcr.io/analogj/scrutiny:master-omnibus
    container_name: scrutiny
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    cap_add: [SYS_RAWIO]
    ports:
      - "${LAN_IP}:8082:8080"
    volumes:
      - /run/udev:/run/udev:ro
      - ${APPDATA_DIR}/scrutiny/config:/opt/scrutiny/config
      - ${APPDATA_DIR}/scrutiny/influxdb:/opt/scrutiny/influxdb
    devices:
      - /dev/sda:/dev/sda
      - /dev/sdb:/dev/sdb
      - /dev/nvme0n1:/dev/nvme0n1
    networks: [default]

  speedtest:
    image: lscr.io/linuxserver/speedtest-tracker:latest
    container_name: speedtest
    restart: always
    security_opt: [no-new-privileges:true]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - SPEEDTEST_SCHEDULE=0 3 * * *
      - APP_KEY=${SPEEDTEST_APP_KEY}
    volumes:
      - ${APPDATA_DIR}/speedtest/config:/config
    ports:
      - "${LAN_IP}:8765:80"
    networks: [default]

  # ── Notifications & RSS ──────────────────────────────────
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ntfy
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    command: serve
    environment:
      - TZ=${TZ}
    volumes:
      - ${APPDATA_DIR}/ntfy/cache:/var/cache/ntfy
      - ${APPDATA_DIR}/ntfy/etc:/etc/ntfy
    ports:
      - "${LAN_IP}:8084:80"
    networks: [default]

  miniflux:
    image: miniflux/miniflux:latest
    container_name: miniflux
    restart: always
    security_opt: [no-new-privileges:true]
    environment:
      - DATABASE_URL=postgres://miniflux:${MINIFLUX_DB_PASS}@miniflux-db/miniflux?sslmode=disable
      - RUN_MIGRATIONS=1
      - CREATE_ADMIN=1
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=${MINIFLUX_ADMIN_PASS}
      - BASE_URL=https://miniflux.${DOMAIN}
      - TZ=${TZ}
    ports:
      - "${LAN_IP}:8070:8080"
    depends_on: [miniflux-db]
    networks: [default]

  miniflux-db:
    image: postgres:16-alpine
    container_name: miniflux-db
    restart: always
    security_opt: [no-new-privileges:true]
    environment:
      - POSTGRES_USER=miniflux
      - POSTGRES_PASSWORD=${MINIFLUX_DB_PASS}
      - POSTGRES_DB=miniflux
    volumes:
      - ${APPDATA_DIR}/miniflux-db:/var/lib/postgresql/data
    networks: [default]

  # ── Utilities ────────────────────────────────────────────
  it-tools:
    image: corentinth/it-tools:latest
    container_name: it-tools
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    ports:
      - "${LAN_IP}:8090:80"
    networks: [default]

  drawio:
    image: jgraph/drawio:latest
    container_name: drawio
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    ports:
      - "${LAN_IP}:8108:8080"
    networks: [default]

  # ── Observability (Prometheus + Grafana + power) ─────────
  # Scrapes node-exporter (host metrics), scaphandre (CPU/RAM watts via RAPL),
  # nvidia-gpu-exporter (GPU watts/temp) and cadvisor (per-container metrics).
  # Grafana provisioning files live in `${APPDATA_DIR}/grafana/provisioning/`
  # — see `../monitoring/` in the repo for example configs and the dashboard.
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    user: "65534:65534"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-90d}'
      - '--web.enable-lifecycle'
    volumes:
      - ${APPDATA_DIR}/prometheus/config:/etc/prometheus:ro
      - ${APPDATA_DIR}/prometheus/data:/prometheus
    ports:
      - "${LAN_IP}:9090:9090"
    networks: [default]

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    user: "472:472"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=https://${GRAFANA_DOMAIN:-grafana.example.com}
      - GF_INSTALL_PLUGINS=
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ${APPDATA_DIR}/grafana/data:/var/lib/grafana
      - ${APPDATA_DIR}/grafana/provisioning:/etc/grafana/provisioning:ro
      - ${APPDATA_DIR}/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${LAN_IP}:3001:3000"
    depends_on: [prometheus]
    networks: [default]

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    pid: host
    networks: [default]

  scaphandre:
    # Reads Intel RAPL counters via /sys/class/powercap — needs privileged.
    # Exposes scaph_host_power_microwatts on :8080 in Prometheus text format.
    image: hubblo/scaphandre:latest
    container_name: scaphandre
    restart: unless-stopped
    privileged: true
    command: prometheus
    volumes:
      - /sys/class/powercap:/sys/class/powercap:ro
      - /proc:/proc:ro
    networks: [default]

  nvidia-gpu-exporter:
    image: utkuozdemir/nvidia_gpu_exporter:1.3.2
    container_name: nvidia-gpu-exporter
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    networks: [default]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    networks: [default]

  # ── Network management ───────────────────────────────────
  # UniFi Network Application (controller for Ubiquiti gear) backed by
  # MongoDB 4.4. Mongo bootstrap user is created from an init script in
  # ${APPDATA_DIR}/unifi-db-init/init-mongo.js using the env vars below.
  # netmap is a tiny static-HTML viewer (nginx:alpine) that renders a
  # generated network map (Nmap → HTML) under ${APPDATA_DIR}/netmap.
  unifi-network-application:
    image: lscr.io/linuxserver/unifi-network-application:latest
    container_name: unifi-network-application
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - MONGO_USER=${UNIFI_DB_USER}
      - MONGO_PASS=${UNIFI_DB_PASSWORD}
      - MONGO_HOST=unifi-db
      - MONGO_PORT=27017
      - MONGO_DBNAME=${UNIFI_DB_NAME}
      - MEM_LIMIT=1024
      - MEM_STARTUP=1024
    volumes:
      - ${APPDATA_DIR}/unifi:/config
    ports:
      - "${LAN_IP}:8443:8443"
      - "${LAN_IP}:3478:3478/udp"
      - "${LAN_IP}:10001:10001/udp"
      - "${LAN_IP}:8083:8080"
      - "${LAN_IP}:1900:1900/udp"
      - "${LAN_IP}:8843:8843"
      - "${LAN_IP}:8880:8880"
      - "${LAN_IP}:6789:6789"
      - "${LAN_IP}:5514:5514/udp"
    depends_on: [unifi-db]
    networks: [default]

  unifi-db:
    image: mongo:4.4
    container_name: unifi-db
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    volumes:
      - ${APPDATA_DIR}/unifi-db:/data/db
      - ${APPDATA_DIR}/unifi-db-init:/docker-entrypoint-initdb.d:ro
    networks: [default]

  netmap:
    image: nginx:alpine
    container_name: netmap
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    volumes:
      - ${APPDATA_DIR}/netmap:/usr/share/nginx/html:ro
    networks: [default]

networks:
  default:
    name: homelab
    driver: bridge
