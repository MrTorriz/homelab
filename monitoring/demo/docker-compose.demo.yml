name: homelab-demo

services:
  synthetic:
    image: python:3.12-slim
    container_name: demo-synthetic
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./synthetic-metrics.py:/app/synthetic-metrics.py:ro
    command: ["python", "/app/synthetic-metrics.py"]
    networks:
      - demo
    security_opt:
      - no-new-privileges:true

  prometheus:
    image: prom/prometheus:latest
    container_name: demo-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=2h'
    ports:
      - "127.0.0.1:9091:9090"
    depends_on:
      - synthetic
    networks:
      - demo
    security_opt:
      - no-new-privileges:true

  grafana:
    image: grafana/grafana-oss:latest
    container_name: demo-grafana
    restart: unless-stopped
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_BASIC_ENABLED=false
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SECURITY_ADMIN_USER=demo
      - GF_SECURITY_ADMIN_PASSWORD=demo-not-for-prod
      - GF_DEFAULT_LANGUAGE=en-US
      - GF_INSTALL_PLUGINS=
    ports:
      - "127.0.0.1:3002:3000"
    volumes:
      - ./provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - demo
    security_opt:
      - no-new-privileges:true

networks:
  demo:
    driver: bridge
