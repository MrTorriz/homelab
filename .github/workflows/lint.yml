name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: ./scripts

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - run: pip install yamllint
      - run: yamllint -c .yamllint .

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          config: .markdownlint.yaml
          globs: '**/*.md'

  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
          GITLEAKS_ENABLE_SUMMARY: true

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate compose
        working-directory: docker
        run: |
          cp .env.example .env
          docker compose config -q

  sanitize-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Fail on personal identifiers
        run: |
          # Patterns assembled at runtime so this workflow does not match itself.
          P1='martin-karls''son'
          P2='192\.168\.10'
          P3='/home/mser''ver'
          P4='/mnt/p''lex'
          P5='realmartin''karlsson'
          PATTERNS="$P1|$P2|$P3|$P4|$P5"
          if grep -rEnH \
               --exclude-dir=.git \
               --exclude-dir=node_modules \
               -- "$PATTERNS" . ; then
            echo "::error::Sanitisation check failed — personal identifiers detected above."
            exit 1
          fi
          echo "Sanitisation check passed — no personal identifiers found."
